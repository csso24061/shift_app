<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト管理システム</title>
    <style>
        :root {
            --primary: #4f46e5; --primary-hover: #4338ca;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg: #f3f4f6; --surface: #ffffff; --text: #1f2937;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1100px; }
        .card { background: var(--surface); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-bottom: 20px; color: #374151; font-size: 1.4rem; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: #4b5563; }
        input, select { width: 100%; padding: 11px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; color: var(--text); transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        
        /* 🔒 ログイン画面の視認性向上・中央配置 */
        .login-container { max-width: 420px; width: 100%; margin: 0 auto; }
        .login-title { text-align: center; justify-content: center; font-size: 1.6rem; color: #111827; margin-bottom: 25px; font-weight: 700; }
        
        /* 🚨 期限通知警告バナー */
        .alert-banner { padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 1rem; display: none; background: #fee2e2; border: 2px solid #ef4444; color: #991b1b; box-shadow: 0 4px 6px rgba(239, 68, 68, 0.1); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        /* カレンダースタイル */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 15px; }
        .day-name { text-align: center; font-weight: bold; padding: 5px; font-size: 0.85rem; color: #6b7280; }
        .calendar-day { background: #f9fafb; border: 1px solid #e5e7eb; min-height: 75px; padding: 6px; border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; transition: all 0.2s; font-weight: 500; }
        .calendar-day:hover { background: #f0fdf4; border-color: var(--success); }
        .calendar-day.selected { background: #e0e7ff; border-color: var(--primary); box-shadow: 0 0 0 2px #c7d2fe; }
        .calendar-day.has-applied { border-left: 4px solid var(--warning); }
        .calendar-day.has-confirmed { background: #f0fdf4; border-left: 4px solid var(--success); }
        .status-dot { font-size: 0.7rem; color: var(--warning); font-weight: bold; margin-top: 4px; }
        
        .flex-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .flex-box { grid-template-columns: 1fr; } }
        
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .badge-applied { background: #fef3c7; color: #d97706; }
        .badge-confirmed { background: #d1fae5; color: #065f46; }
        
        .shift-item { padding: 15px; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 10px; background: #f9fafb; }
        .salary-breakdown { font-size: 0.85rem; color: #4b5563; background: #f3f4f6; padding: 10px; border-radius: 6px; margin-top: 8px; line-height: 1.5; }
        .admin-actions { margin-top: 10px; display: flex; gap: 10px; }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; width: auto; }
        .btn-danger { background: var(--danger); } .btn-danger:hover { background: #dc2626; }
        .btn-success { background: var(--success); } .btn-success:hover { background: #059669; }

        /* 給与サマリーパネル */
        .summary-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .summary-title { font-size: 0.9rem; opacity: 0.9; margin-bottom: 5px; font-weight: bold; }
        .summary-amount { font-size: 2rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="mainContainer" class="login-container">
    
    <!-- 1. ログインカード -->
    <div id="loginCard" class="card" style="margin-bottom: 0;">
        <h2 class="login-title">🔐 シフト管理システム</h2>
        <div class="form-group">
            <label for="userId">ユーザーID</label>
            <input type="text" id="userId" placeholder="staff01 または admin01">
        </div>
        <div class="form-group" style="margin-bottom: 22px;">
            <label for="password">パスワード</label>
            <input type="password" id="password" value="password123">
        </div>
        <button onclick="handleLogin()">ログイン</button>
    </div>

    <!-- 2. メインダッシュボード -->
    <div id="dashboard" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 id="welcomeText" style="font-size: 1.6rem;">👋 ようこそ</h1>
            <button onclick="handleLogout()" class="btn-sm btn-danger" style="margin-top:0;">ログアウト</button>
        </div>

        <div id="alertBanner" class="alert-banner"></div>

        <div class="card" style="padding:15px; background: #eff6ff; border-left: 4px solid var(--primary); margin-bottom: 15px;">
            <p id="systemSettingsText" style="font-size:0.9rem; color:#1e40af; font-weight:500;"></p>
        </div>

        <div id="salarySummaryCard" class="summary-card" style="display: none;">
            <div class="summary-title">今月の概算給与合計 (確定＋承認待ち)</div>
            <div class="summary-amount" id="totalMonthlySalary">¥0</div>
        </div>

        <div class="flex-box">
            <!-- 左側：カレンダー＆シフト申請 -->
            <div id="calendarZone" class="card">
                <h2 id="calendarTitle">📅 シフトカレンダー</h2>
                <p id="selectedDateText" style="font-weight: bold; color: var(--primary); margin-bottom: 10px;">📅 日付を選択してください</p>
                
                <div class="calendar-grid" id="calendarGrid"></div>

                <div id="shiftFormFields" style="margin-top:15px;">
                    <div class="form-group"><label>開始時間</label><input type="time" id="startTime" value="09:00"></div>
                    <div class="form-group"><label>終了時間</label><input type="time" id="endTime" value="18:00"></div>
                    <div class="form-group" id="adminStaffSelectGroup" style="display: none;">
                        <label>対象スタッフID</label>
                        <input type="text" id="targetStaffId" placeholder="例: staff01">
                    </div>
                    <button id="submitBtn" onclick="submitShift()" disabled>この日付でシフトを登録・申請する</button>
                </div>
            </div>

            <!-- 右側：シフト一覧 -->
            <div class="card">
                <h2 id="listTitle">📋 シフト一覧</h2>
                <div id="shiftList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://127.0.0.1:5000/api';
    let currentLoggedInUser = '';
    let currentLoggedInName = '';
    let userRole = '';
    let selectedDate = '';
    let allShifts = [];

    const mainContainer = document.getElementById('mainContainer');
    const loginCard = document.getElementById('loginCard');
    const dashboard = document.getElementById('dashboard');
    const welcomeText = document.getElementById('welcomeText');
    const systemSettingsText = document.getElementById('systemSettingsText');
    const alertBanner = document.getElementById('alertBanner');
    const calendarGrid = document.getElementById('calendarGrid');
    const selectedDateText = document.getElementById('selectedDateText');
    const submitBtn = document.getElementById('submitBtn');
    const shiftList = document.getElementById('shiftList');
    const calendarZone = document.getElementById('calendarZone');
    const listTitle = document.getElementById('listTitle');
    const calendarTitle = document.getElementById('calendarTitle');
    const salarySummaryCard = document.getElementById('salarySummaryCard');
    const totalMonthlySalary = document.getElementById('totalMonthlySalary');
    const adminStaffSelectGroup = document.getElementById('adminStaffSelectGroup');

    async function handleLogin() {
        const userId = document.getElementById('userId').value;
        const password = document.getElementById('password').value;
        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, password })
            });
            const data = await res.json();
            if (data.status === 'success') {
                currentLoggedInUser = userId; 
                currentLoggedInName = data.user.name;
                userRole = data.user.role;
                welcomeText.innerText = `👋 ようこそ、${currentLoggedInName} さん (${userRole === 'manager' ? '管理者' : 'スタッフ'})`;
                
                loginCard.style.display = 'none'; 
                dashboard.style.display = 'block';
                mainContainer.className = 'container';
                document.body.style.alignItems = 'flex-start';

                if (userRole === 'manager') {
                    calendarTitle.innerText = '⚙️ シフト代理登録・カレンダー確認';
                    listTitle.innerText = '⚙️ 全スタッフのシフト管理（承認・編集）';
                    adminStaffSelectGroup.style.display = 'block';
                    salarySummaryCard.style.display = 'none';
                } else {
                    calendarTitle.innerText = '📅 希望シフトの申請';
                    listTitle.innerText = '📋 自分の申請済みシフト一覧';
                    adminStaffSelectGroup.style.display = 'none';
                    salarySummaryCard.style.display = 'block';
                }
                
                await loadSystemSettings(); await fetchShifts(); await checkNotifications();
            } else {
                alert('⚠️ ' + data.message);
            }
        } catch (err) { alert('⚠️ ログイン通信に失敗しました。サーバーが起動しているか確認してください。'); }
    }

    async function loadSystemSettings() {
        const res = await fetch(`${API_URL}/settings`); const data = await res.json();
        if (data.status === 'success') {
            systemSettingsText.innerText = `📢 【システム設定】提出期限: ${data.settings.deadlineDate} | 締め日: ${data.settings.closingDate} | 支給日: ${data.settings.paymentDate}`;
        }
    }

    async function checkNotifications() {
        if (userRole === 'manager') return;
        const res = await fetch(`${API_URL}/notifications`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentLoggedInUser })
        });
        const data = await res.json();
        if (data.status === 'success' && data.alerts && data.alerts.length > 0) {
            const alertMsg = data.alerts[0].message;
            alertBanner.innerText = alertMsg;
            alertBanner.style.display = 'block';
            setTimeout(() => { alert(alertMsg); }, 100);
        } else {
            alertBanner.style.display = 'none';
        }
    }

    function generateCalendar() {
        calendarGrid.innerHTML = `
            <div class="day-name">日</div><div class="day-name">月</div><div class="day-name">火</div>
            <div class="day-name">水</div><div class="day-name">木</div><div class="day-name">金</div><div class="day-name">土</div>
        `;
        const now = new Date(); const year = now.getFullYear(); const month = now.getMonth();
        const firstDayIndex = new Date(year, month, 1).getDay();
        const lastDay = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDayIndex; i++) calendarGrid.appendChild(document.createElement('div'));

        for (let day = 1; day <= lastDay; day++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'calendar-day'; dayDiv.innerText = day;
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            dayDiv.dataset.date = dateStr;

            if (userRole === 'manager') {
                const dayShifts = allShifts.filter(s => s.date === dateStr);
                if (dayShifts.length > 0) {
                    const appliedCount = dayShifts.filter(s => s.status === 'applied').length;
                    const confirmedCount = dayShifts.filter(s => s.status === 'confirmed').length;
                    if (appliedCount > 0) {
                        dayDiv.classList.add('has-applied');
                        dayDiv.innerHTML += `<span class="status-dot" style="color:var(--warning);">⏳ 未承認: ${appliedCount}件</span>`;
                    }
                    if (confirmedCount > 0) {
                        dayDiv.classList.add('has-confirmed');
                        dayDiv.innerHTML += `<span class="status-dot" style="color:#057a55;">✅ 確定: ${confirmedCount}件</span>`;
                    }
                }
            } else {
                const dayShifts = allShifts.filter(s => s.date === dateStr && s.username === currentLoggedInUser);
                if (dayShifts.length > 0) {
                    const confirmedShift = dayShifts.find(s => s.status === 'confirmed');
                    if (confirmedShift) {
                        dayDiv.classList.add('has-confirmed'); 
                        dayDiv.innerHTML += `<span class="status-dot" style="font-size: 0.65rem; color: #057a55; display: block; margin-top: 2px;">⏰ ${confirmedShift.startTime}～${confirmedShift.endTime}</span>`;
                    } else {
                        dayDiv.classList.add('has-applied'); dayDiv.innerHTML += `<span class="status-dot">希望中</span>`;
                    }
                }
            }

            dayDiv.addEventListener('click', function() {
                document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
                this.classList.add('selected'); selectedDate = this.dataset.date;
                selectedDateText.innerText = `📅 選択中: ${month + 1}月${day}日`;
                submitBtn.disabled = false;
            });
            calendarGrid.appendChild(dayDiv);
        }
    }

    async function fetchShifts() {
        const res = await fetch(`${API_URL}/shifts`); const data = await res.json();
        if (data.status === 'success') {
            allShifts = data.shifts;
            generateCalendar();
            renderShiftList();
            if (userRole === 'staff') calculateMonthlySalarySummary();
        }
    }

    function calculateMonthlySalarySummary() {
        const myShifts = allShifts.filter(s => s.username === currentLoggedInUser);
        const total = myShifts.reduce((sum, shift) => sum + shift.calculation.totalPay, 0);
        totalMonthlySalary.innerText = `¥${total.toLocaleString()}`;
    }

    function renderShiftList() {
        shiftList.innerHTML = '';
        const filtered = userRole === 'manager' ? allShifts : allShifts.filter(s => s.username === currentLoggedInUser);
        
        if (filtered.length === 0) { shiftList.innerHTML = '<p style="color:#6b7280;">該当するシフトはまだありません。</p>'; return; }

        filtered.forEach(shift => {
            const item = document.createElement('div'); item.className = 'shift-item';
            const calc = shift.calculation;
            const statusBadge = shift.status === 'confirmed' ? '<span class="badge badge-confirmed">確定</span>' : '<span class="badge badge-applied">承認待ち</span>';
            
            // 💡 IDではなく、バックエンドからマッピングして返された「氏名(フルネーム)」を表示
            const displayName = shift.name ? shift.name : shift.username;

            let htmlStr = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong>📅 ${shift.date} (${shift.startTime} ～ ${shift.endTime})</strong>
                    ${statusBadge}
                </div>
                <div style="font-size:0.85rem; color:#6b7280; margin-top:4px;">申請者: ${displayName} | 総労働時間: ${calc.totalHours}時間</div>
                <div class="salary-breakdown">
                    💰 <strong>概算給与合計: ¥${calc.totalPay.toLocaleString()}</strong><br>
                    <span style="font-size:0.75rem; color:#6b7280;">(内訳: 基本給 ¥${calc.basicPay.toLocaleString()} | 残業手当 ¥${calc.overtimePay.toLocaleString()} | 深夜手当 ¥${calc.nightPay.toLocaleString()})</span>
                </div>
            `;

            if (userRole === 'manager') {
                htmlStr += `<div class="admin-actions">`;
                if (shift.status === 'applied') {
                    htmlStr += `<button class="btn-sm btn-success" onclick="updateShift(${shift.id}, 'confirm')">👍 確定する</button>`;
                }
                htmlStr += `
                    <button class="btn-sm" style="background:#6b7280;" onclick="openEditPrompt(${shift.id}, '${shift.startTime}', '${shift.endTime}')">✏️ 編集</button>
                    <button class="btn-sm btn-danger" onclick="updateShift(${shift.id}, 'delete')">🗑️ 却下・削除</button>
                </div>`;
            } else if (userRole === 'staff') {
                htmlStr += `
                    <div class="admin-actions">
                        <button class="btn-sm btn-danger" onclick="cancelShiftByStaff(${shift.id})">❌ 申請をキャンセル</button>
                    </div>`;
            }
            item.innerHTML = htmlStr; shiftList.appendChild(item);
        });
    }

    async function submitShift() {
        const startTime = document.getElementById('startTime').value;
        const endTime = document.getElementById('endTime').value;
        let username = currentLoggedInUser;
        
        if (userRole === 'manager') {
            const target = document.getElementById('targetStaffId').value.trim();
            if (!target) { alert('⚠️ 対象スタッフIDを入力してください。'); return; }
            username = target;
        }

        const res = await fetch(`${API_URL}/shift-submit`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, date: selectedDate, startTime, endTime })
        });
        if (res.ok) { 
            alert(userRole === 'manager' ? '✅ 管理者としてシフトを登録しました。' : '✅ シフトを申請しました。'); 
            await fetchShifts();
            await checkNotifications();
        }
    }

    async function updateShift(shiftId, action) {
        const res = await fetch(`${API_URL}/admin/shift-update`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ shiftId, action })
        });
        if (res.ok) { await fetchShifts(); }
    }

    async function openEditPrompt(shiftId, currentStart, currentEnd) {
        const newStart = prompt("新しい開始時間を入力してください (HH:MM)", currentStart);
        const newEnd = prompt("新しい終了時間を入力してください (HH:MM)", currentEnd);
        if (!newStart || !newEnd) return;
        
        const res = await fetch(`${API_URL}/admin/shift-update`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ shiftId, action: 'edit', startTime: newStart, endTime: newEnd })
        });
        if (res.ok) { alert('✅ シフトおよび給与を再計算しました。'); await fetchShifts(); }
    }

    async function cancelShiftByStaff(shiftId) {
        const res = await fetch(`${API_URL}/shift-cancel`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ shiftId })
        });
        const data = await res.json();
        if (res.ok) { alert('✅ シフトをキャンセルしました。'); await fetchShifts(); await checkNotifications(); }
        else { alert(data.message); }
    }

    function handleLogout() {
        currentLoggedInUser = ''; currentLoggedInName = ''; userRole = ''; 
        dashboard.style.display = 'none'; 
        loginCard.style.display = 'block';
        mainContainer.className = 'login-container';
        document.body.style.alignItems = 'center';
    }
</script>
</body>
</html>
