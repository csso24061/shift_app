<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 希望シフト提出</title>
    <style>
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            font-family: sans-serif;
            background: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 5px; font-weight: bold; }
        select, input { padding: 10px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
        .error-banner { background: #fde8e8; color: #e02424; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-weight: bold; }
        .submit-btn { width: 100%; padding: 12px; background: #1c64f2; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        .submit-btn:hover { background: #1a56db; }
        
        /* 💰 給与表示ボックスのスタイル */
        .success-box { margin-top: 20px; padding: 15px; background: #def7ec; color: #03543f; border-radius: 4px; }
        .salary-spec { background: white; padding: 10px; border-radius: 4px; margin-top: 10px; border-left: 4px solid #0e9f6e; color: #333;}
        .salary-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.95rem; }
        .salary-total { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; border-top: 1px solid #ddd; padding-top: 5px; margin-top: 5px; color: #0e9f6e; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📅 希望シフト提出</h1>
        <p class="subtitle">【機能①】Pythonによる給与・各種手当の自動計算</p>

        <form id="shiftForm">
            <div class="form-group">
                <label>勤務希望日:</label>
                <input type="date" id="shiftDate">
            </div>

            <div class="form-group">
                <label>開始時間:</label>
                <select id="startTime"></select>
            </div>

            <div class="form-group">
                <label>終了時間:</label>
                <select id="endTime"></select>
            </div>

            <div id="errorArea"></div>

            <button type="submit" class="submit-btn">希望シフトを送信</button>
        </form>

        <div id="successArea"></div>
    </div>

    <script>
        const startTimeSelect = document.getElementById('startTime');
        const endTimeSelect = document.getElementById('endTime');
        
        for (let hour = 0; hour < 24; hour++) {
            for (let min of ["00", "30"]) {
                const hh = String(hour).padStart(2, '0');
                const timeStr = `${hh}:${min}`;
                startTimeSelect.add(new Option(timeStr, timeStr));
                endTimeSelect.add(new Option(timeStr, timeStr));
            }
        }
        startTimeSelect.value = "09:00";
        endTimeSelect.value = "18:00";

        document.getElementById('shiftForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorArea = document.getElementById('errorArea');
            const successArea = document.getElementById('successArea');
            errorArea.innerHTML = '';
            successArea.innerHTML = '';

            const payload = {
                date: document.getElementById('shiftDate').value,
                startTime: startTimeSelect.value,
                endTime: endTimeSelect.value
            };

            try {
                const response = await fetch('http://127.0.0.1:5000/api/shift-submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (!response.ok) {
                    errorArea.innerHTML = `<div class="error-banner">${result.message}</div>`;
                } else {
                    const calc = result.data.calculation;
                    successArea.innerHTML = `
                        <div class="success-box">
                            <h3>${result.message}</h3>
                            <p><strong>勤務時間:</strong> ${result.data.startTime} ～ ${result.data.endTime} (${calc.totalHours}時間)</p>
                            
                            <div class="salary-spec">
                                <div class="salary-row"><span>基本給 (時給¥${calc.baseRate}):</span> <span>¥${calc.basicPay.toLocaleString()}</span></div>
                                <div class="salary-row"><span>残業手当 (8h超/25%UP):</span> <span>¥${calc.overtimePay.toLocaleString()}</span></div>
                                <div class="salary-row"><span>深夜手当 (22時以降/25%UP):</span> <span>¥${calc.nightPay.toLocaleString()}</span></div>
                                <div class="salary-total"><span>概算支給額:</span> <span>¥${calc.totalPay.toLocaleString()}</span></div>
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                errorArea.innerHTML = `<div class="error-banner">⚠️ Flaskサーバーに接続できません。app.pyが起動しているか確認してください。</div>`;
            }
        });
    </script>
</body>
</html>
