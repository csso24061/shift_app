<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト管理システム</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --warning-color: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            display: none;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }

        input[type="text"], input[type="password"], input[type="date"], input[type="time"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1em;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        /* 警告表示用バナー */
        .alert-banner {
            display: none;
            background-color: #fef3c7;
            border-left: 4px solid var(--warning-color);
            color: #92400e;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* ダッシュボードレイアウト */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-info {
            font-size: 1.1em;
        }

        .logout-btn {
            background-color: var(--danger-color);
            width: auto;
            padding: 8px 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 2fr;
            }
        }

        .table-container {
            overflow-x: auto;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f9fafb;
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .badge-pending { background-color: #fef3c7; color: #d97706; }
        .badge-approved { background-color: #d1fae5; color: #059669; }
        .badge-rejected { background-color: #fee2e2; color: #dc2626; }

        .btn-group {
            display: flex;
            gap: 5px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85em;
            width: auto;
        }

        .btn-approve { background-color: var(--success-color); }
        .btn-reject { background-color: var(--danger-color); }
    </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginCard" class="login-container card">
    <h2>シフト管理 ログイン</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="userId">ユーザーID</label>
            <input type="text" id="userId" placeholder="IDを入力してください" required>
        </div>
        <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password" id="password" placeholder="パスワードを入力してください" required>
        </div>
        <button type="submit">ログイン</button>
    </form>
</div>

<!-- メインダッシュボード -->
<div id="dashboard" class="dashboard-container">
    <!-- 提出期限アラートバナー -->
    <div id="deadlineAlert" class="alert-banner"></div>

    <div class="header">
        <div class="user-info">
            ログイン中: <strong id="loggedInUser">ユーザー名</strong> 
            [<span id="userRoleBadge">権限</span>]
        </div>
        <button class="logout-btn" onclick="handleLogout()">ログアウト</button>
    </div>

    <!-- スタッフ用画面 -->
    <div id="staffView" class="grid" style="display: none;">
        <div class="card">
            <h3>シフト提出申請</h3>
            <form id="shiftSubmitForm" style="margin-top: 15px;">
                <div class="form-group">
                    <label for="shiftDate">希望日</label>
                    <input type="date" id="shiftDate" required>
                </div>
                <div class="form-group">
                    <label for="startTime">開始時間</label>
                    <input type="time" id="startTime" required>
                </div>
                <div class="form-group">
                    <label for="endTime">終了時間</label>
                    <input type="time" id="endTime" required>
                </div>
                <div class="form-group">
                    <label for="breakTime">休憩時間 (分)</label>
                    <input type="number" id="breakTime" min="0" value="0" required>
                </div>
                <button type="submit">シフトを申請する</button>
            </form>
        </div>

        <div class="card">
            <h3>あなたのシフト一覧</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>日付</th>
                            <th>時間帯</th>
                            <th>休憩</th>
                            <th>ステータス</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="staffShiftTableBody">
                        <!-- 動的に挿入 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 管理者用画面 -->
    <div id="adminView" class="grid" style="display: none;">
        <div class="card">
            <h3>各種設定</h3>
            <div class="form-group" style="margin-top: 15px;">
                <label for="deadlineSetting">シフト提出期限設定</label>
                <input type="date" id="deadlineSetting">
                <button onclick="saveDeadline()" style="margin-top: 10px;">期限を保存</button>
            </div>
        </div>

        <div class="card">
            <h3>スタッフシフト申請一覧</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>申請者</th>
                            <th>日付</th>
                            <th>時間帯</th>
                            <th>休憩</th>
                            <th>ステータス</th>
                            <th>アクション</th>
                        </tr>
                    </thead>
                    <tbody id="adminShiftTableBody">
                        <!-- 動的に挿入 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://127.0.0.1:5001/api'; // バックエンドAPIのURL

    let currentLoggedInUser = '';
    let currentLoggedInName = '';
    let userRole = '';
    let allShifts = [];
    let systemDeadline = ''; // 設定されたシフト提出期限

    const loginCard = document.getElementById('loginCard');
    const dashboard = document.getElementById('dashboard');
    const mainContainer = document.body;

    // ログイン処理
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const userId = document.getElementById('userId').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: userId, password: password })
            });

            if (res.ok) {
                const data = await res.json();
                currentLoggedInUser = userId;
                currentLoggedInName = data.name || userId;
                userRole = data.role; // 'admin' または 'staff'

                // 画面遷移
                loginCard.style.display = 'none';
                dashboard.style.display = 'block';
                document.getElementById('loggedInUser').innerText = currentLoggedInName;
                document.getElementById('userRoleBadge').innerText = userRole === 'admin' ? '管理者' : 'スタッフ';

                // 初期データの同期
                await fetchDeadline();
                await fetchShifts();

                if (userRole === 'admin') {
                    document.getElementById('adminView').style.display = 'grid';
                    document.getElementById('staffView').style.display = 'none';
                } else {
                    document.getElementById('staffView').style.display = 'grid';
                    document.getElementById('adminView').style.display = 'none';
                }
            } else {
                alert('⚠️ ログインに失敗しました。ユーザーIDまたはパスワードが違います。');
            }
        } catch (err) {
            console.error(err);
            alert('⚠️ サーバーに接続できません。');
        }
    });

    // 提出期限の取得
    async function fetchDeadline() {
        try {
            const res = await fetch(`${API_URL}/deadline`);
            if (res.ok) {
                const data = await res.json();
                systemDeadline = data.deadline || '';
                document.getElementById('deadlineSetting').value = systemDeadline;
                updateDeadlineWarning(); // 期限表示の判定・更新
            }
        } catch (err) {
            console.error('期限の取得に失敗:', err);
        }
    }

    // 提出期限の保存（管理者用）
    async function saveDeadline() {
        const newDeadline = document.getElementById('deadlineSetting').value;
        try {
            const res = await fetch(`${API_URL}/deadline`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ deadline: newDeadline })
            });

            if (res.ok) {
                alert('✅ 提出期限を更新しました。');
                systemDeadline = newDeadline;
                updateDeadlineWarning(); // 保存後即時で警告表示を更新
            } else {
                alert('⚠️ 期限の更新に失敗しました。');
            }
        } catch (err) {
            console.error(err);
        }
    }

    // 提出期限3日前判定とアラートバナーの更新
    function updateDeadlineWarning() {
        const alertBanner = document.getElementById('deadlineAlert');
        if (!systemDeadline) {
            alertBanner.style.display = 'none';
            return;
        }

        const now = new Date();
        // 日付のみの比較ではなく、設定された期限日の「終わり（23:59:59）」をデッドラインとする
        const deadlineDate = new Date(systemDeadline + "T23:59:59");
        
        // 3日前（ミリ秒換算: 3日 * 24時間 * 60分 * 60秒 * 1000ミリ秒）
        const threeDaysInMs = 3 * 24 * 60 * 60 * 1000;
        const diffTime = deadlineDate - now;

        if (diffTime < 0) {
            // すでに期限が過ぎている場合
            alertBanner.style.display = 'block';
            alertBanner.style.backgroundColor = '#fee2e2';
            alertBanner.style.borderColor = 'var(--danger-color)';
            alertBanner.style.color = '#991b1b';
            alertBanner.innerHTML = `⚠️ シフトの提出期限（${systemDeadline}）を過ぎました。新規提出や変更はできません。`;
        } else if (diffTime <= threeDaysInMs) {
            // 期限3日前に入っている場合
            alertBanner.style.display = 'block';
            alertBanner.style.backgroundColor = '#fef3c7';
            alertBanner.style.borderColor = 'var(--warning-color)';
            alertBanner.style.color = '#92400e';
            alertBanner.innerHTML = `⏰ シフトの提出期限が近づいています！【 提出期限: ${systemDeadline} 】`;
        } else {
            // 3日以上前の場合、警告を表示しない
            alertBanner.style.display = 'none';
        }
    }

    // シフト一覧の取得
    async function fetchShifts() {
        try {
            const res = await fetch(`${API_URL}/shifts`);
            if (res.ok) {
                allShifts = await res.json();
                renderShifts();
            }
        } catch (err) {
            console.error('シフト情報の取得に失敗:', err);
        }
    }

    // シフトの描画処理
    function renderShifts() {
        const staffBody = document.getElementById('staffShiftTableBody');
        const adminBody = document.getElementById('adminShiftTableBody');

        staffBody.innerHTML = '';
        adminBody.innerHTML = '';

        allShifts.forEach(shift => {
            const statusBadge = getStatusBadge(shift.status);
            const dateStr = shift.date;

            // 1. スタッフビューの描画 (自分のもののみ表示)
            if (userRole === 'staff' && shift.username === currentLoggedInUser) {
                const isLocked = isWithinOneWeekOrPast(dateStr);
                const actionButton = isLocked 
                    ? `<span style="color: gray; font-size: 0.9em;">変更不可(直近)</span>`
                    : `<button class="logout-btn btn-sm" onclick="cancelShiftByStaff('${shift.id}')">❌ キャンセル</button>`;

                const row = `<tr>
                    <td>${shift.date}</td>
                    <td>${shift.startTime} 〜 ${shift.endTime}</td>
                    <td>${shift.breakTime}分</td>
                    <td>${statusBadge}</td>
                    <td>${actionButton}</td>
                </tr>`;
                staffBody.innerHTML += row;
            }

            // 2. 管理者ビューの描画 (全員のものを表示)
            if (userRole === 'admin') {
                const isApproved = shift.status === 'approved';
                const isRejected = shift.status === 'rejected';

                const row = `<tr>
                    <td><strong>${shift.name || shift.username}</strong></td>
                    <td>${shift.date}</td>
                    <td>${shift.startTime} 〜 ${shift.endTime}</td>
                    <td>${shift.breakTime}分</td>
                    <td>${statusBadge}</td>
                    <td>
                        <div class="btn-group">
                            <button class="btn-sm btn-approve" onclick="updateShiftStatus('${shift.id}', 'approved')" ${isApproved ? 'disabled' : ''}>承認</button>
                            <button class="btn-sm btn-reject" onclick="updateShiftStatus('${shift.id}', 'rejected')" ${isRejected ? 'disabled' : ''}>却下</button>
                            <button class="btn-sm" style="background-color: var(--primary-color);" onclick="openEditPrompt('${shift.id}', '${shift.startTime}', '${shift.endTime}', '${shift.breakTime}')">編集</button>
                        </div>
                    </td>
                </tr>`;
                adminBody.innerHTML += row;
            }
        });
    }

    // ステータスバッジの生成
    function getStatusBadge(status) {
        if (status === 'approved') return `<span class="badge badge-approved">承認済</span>`;
        if (status === 'rejected') return `<span class="badge badge-rejected">却下</span>`;
        return `<span class="badge badge-pending">保留中</span>`;
    }

    // 直近1週間（または過去の日付）かどうか判定するヘルパー関数
    function isWithinOneWeekOrPast(dateStr) {
        const targetDate = new Date(dateStr);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        // 過去の日付
        if (targetDate < today) return true;

        // 今から1週間後までの日数制限
        const oneWeekLater = new Date();
        oneWeekLater.setDate(today.getDate() + 7);
        return targetDate <= oneWeekLater;
    }

    // スタッフ：新規シフト申請
    document.getElementById('shiftSubmitForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // シフト提出期限を過ぎている場合は申請をブロック
        if (systemDeadline) {
            const now = new Date();
            const deadlineDate = new Date(systemDeadline + "T23:59:59");
            if (now > deadlineDate) {
                alert('⚠️ 提出期限を過ぎているため、新しいシフトを提出できません。');
                return;
            }
        }

        const date = document.getElementById('shiftDate').value;
        const startTime = document.getElementById('startTime').value;
        const endTime = document.getElementById('endTime').value;
        const breakTime = document.getElementById('breakTime').value;

        if (isWithinOneWeekOrPast(date)) {
            alert('⚠️ 1週間以内の日付、または過去の日付にはシフト申請できません。');
            return;
        }

        try {
            const res = await fetch(`${API_URL}/shifts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: currentLoggedInUser,
                    name: currentLoggedInName,
                    date,
                    startTime,
                    endTime,
                    breakTime
                })
            });

            if (res.ok) {
                alert('✅ シフトを申請しました。');
                document.getElementById('shiftSubmitForm').reset();
                document.getElementById('breakTime').value = '0';
                await fetchShifts();
            } else {
                alert('⚠️ 申請に失敗しました。');
            }
        } catch (err) {
            console.error(err);
        }
    });

    // 管理者：シフト承認・却下ステータスのアップデート
    async function updateShiftStatus(shiftId, status) {
        try {
            const res = await fetch(`${API_URL}/admin/shift-update`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ shiftId, action: status })
            });

            if (res.ok) {
                alert(`✅ シフトを${status === 'approved' ? '承認' : '却下'}しました。`);
                await fetchShifts();
            } else {
                alert('⚠️ 更新に失敗しました。');
            }
        } catch (err) {
            console.error(err);
        }
    }

    // 管理者：シフト編集用ダイアログ処理
    async function openEditPrompt(shiftId, currentStart, currentEnd, currentBreak) {
        const newStart = prompt("新しい開始時間 (HH:MM)", currentStart);
        if (!newStart) return;
        const newEnd = prompt("新しい終了時間 (HH:MM)", currentEnd);
        if (!newEnd) return;
        const newBreak = prompt("新しい休憩時間 (分)", currentBreak);
        if (newBreak === null) return;

        try {
            const res = await fetch(`${API_URL}/admin/shift-update`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    shiftId, 
                    action: 'edit', 
                    startTime: newStart, 
                    endTime: newEnd, 
                    breakTime: newBreak 
                })
            });
            if (res.ok) {
                alert('✅ シフトを編集しました。');
                await fetchShifts();
            } else {
                const d = await res.json();
                alert('⚠️ ' + (d.message || '編集に失敗しました'));
            }
        } catch (err) {
            console.error(err);
        }
    }

    // スタッフ：シフト申請のキャンセル
    async function cancelShiftByStaff(shiftId) {
        if (!confirm('このシフト申請をキャンセルしてもよろしいですか？')) return;

        const shift = allShifts.find(s => s.id === shiftId);
        if (shift && isWithinOneWeekOrPast(shift.date)) {
            alert('⚠️ 1週間以内のシフトは変更・キャンセルできません。');
            return;
        }

        try {
            const res = await fetch(`${API_URL}/admin/shift-update`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ shiftId, action: 'delete' }) 
            });
            
            if (res.ok) {
                alert('✅ シフトをキャンセルしました。');
                await fetchShifts();
            } else {
                alert('⚠️ キャンセルに失敗しました。');
            }
        } catch (err) {
            console.error(err);
        }
    }

    // ログアウト処理
    function handleLogout() {
        currentLoggedInUser = '';
        currentLoggedInName = '';
        userRole = '';
        allShifts = [];
        systemDeadline = '';
        
        // 入力フォームリセット
        document.getElementById('userId').value = '';
        document.getElementById('password').value = '';
        
        // 画面表示のリセット
        loginCard.style.display = 'block';
        dashboard.style.display = 'none';
        document.getElementById('deadlineAlert').style.display = 'none';
        
        alert('👋 ログアウトしました。');
    }
</script>
</body>
</html>
