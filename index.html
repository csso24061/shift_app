<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト管理システム</title>
    <style>
        :root {
            --primary: #4f46e5; --primary-hover: #4338ca;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg: #f3f4f6; --surface: #ffffff; --text: #1f2937;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1100px; }
        .card { background: var(--surface); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-bottom: 20px; color: #374151; font-size: 1.4rem; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: #4b5563; }
        input, select { width: 100%; padding: 11px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; color: var(--text); transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        
        .login-container { max-width: 420px; width: 100%; margin: 0 auto; }
        .login-title { text-align: center; justify-content: center; font-size: 1.6rem; color: #111827; margin-bottom: 25px; font-weight: 700; }
        
        .alert-banner { padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 1rem; display: none; background: #fee2e2; border: 2px solid #ef4444; color: #991b1b; box-shadow: 0 4px 6px rgba(239, 68, 68, 0.1); }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .calendar-nav-btn { width: auto; padding: 6px 14px; font-size: 0.9rem; background: #64748b; }
        .calendar-nav-btn:hover { background: #475569; }
        .current-month-display { font-weight: bold; font-size: 1.2rem; color: #1e293b; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 5px; }
        .day-name { text-align: center; font-weight: bold; padding: 5px; font-size: 0.85rem; color: #6b7280; }
        
        .calendar-day { background: #f9fafb; border: 1px solid #e5e7eb; min-height: 105px; padding: 6px; border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; transition: all 0.2s; font-weight: 500; position: relative; }
        .calendar-day:hover { background: #f0fdf4; border-color: var(--success); }
        .calendar-day.today { border: 2px solid #2563eb !important; background: #eff6ff; }
        .today-badge { font-size: 0.65rem; color: #ffffff; background: #2563eb; padding: 1px 4px; border-radius: 3px; position: absolute; top: 4px; right: 4px; font-weight: bold; }
        
        .calendar-day.selected { background: #e0e7ff; border-color: var(--primary); box-shadow: 0 0 0 2px #c7d2fe; }
        .calendar-day.has-applied { border-left: 4px solid var(--warning); }
        .calendar-day.has-confirmed { background: #f0fdf4; border-left: 4px solid var(--success); }
        .status-dot { font-size: 0.7rem; color: var(--warning); font-weight: bold; margin-top: 2px; }
        
        .day-memo { font-size: 0.65rem; color: #ef4444; background: #fee2e2; border-radius: 3px; padding: 1px 3px; margin-top: 3px; text-align: center; word-break: break-all; font-weight: bold; }

        .flex-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .flex-box { grid-template-columns: 1fr; } }
        
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .badge-applied { background: #fef3c7; color: #d97706; }
        .badge-confirmed { background: #d1fae5; color: #065f46; }
        
        .shift-item { padding: 15px; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 10px; background: #f9fafb; }
        .salary-breakdown { font-size: 0.85rem; color: #4b5563; background: #f3f4f6; padding: 10px; border-radius: 6px; margin-top: 8px; line-height: 1.5; }
        .admin-actions { margin-top: 10px; display: flex; gap: 10px; }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; width: auto; }
        .btn-danger { background: var(--danger); } .btn-danger:hover { background: #dc2626; }
        .btn-success { background: var(--success); } .btn-success:hover { background: #059669; }

        .summary-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        @media (max-width: 480px) { .summary-wrapper { grid-template-columns: 1fr; } }
        .summary-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 18px; border-radius: 12px; }
        .summary-card.time-card { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .summary-title { font-size: 0.85rem; opacity: 0.9; margin-bottom: 5px; font-weight: bold; }
        .summary-amount { font-size: 1.8rem; font-weight: bold; }
        
        .settings-form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: flex-end; }
        @media (max-width: 768px) { .settings-form-grid { grid-template-columns: 1fr; } }

        .payslip-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        .payslip-table th, .payslip-table td { border: 1px solid #e5e7eb; padding: 8px; text-align: left; }
        .payslip-table th { background: #f3f4f6; }
    </style>
</head>
<body>

<div id="mainContainer" class="login-container">
    <div id="loginCard" class="card" style="margin-bottom: 0;">
        <h2 class="login-title">🔐 シフト管理システム</h2>
        <div class="form-group">
            <label for="userId">ユーザーID</label>
            <input type="text" id="userId" placeholder="スタッフ: staff01 / 管理者: admin01">
        </div>
        <div class="form-group" style="margin-bottom: 22px;">
            <label for="password">パスワード</label>
            <input type="password" id="password" placeholder="パスワードを入力してください">
        </div>
        <button onclick="handleLogin()">ログイン</button>
    </div>

    <div id="dashboard" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 id="welcomeText" style="font-size: 1.6rem;">👋 利用者画面</h1>
            <button onclick="handleLogout()" class="btn-sm btn-danger" style="margin-top:0;">ログアウト</button>
        </div>

        <div id="alertBanner" class="alert-banner"></div>

        <div class="card" style="padding:15px; background: #eff6ff; border-left: 4px solid var(--primary); margin-bottom: 15px;">
            <p id="systemSettingsText" style="font-size:0.9rem; color:#1e40af; font-weight:500;"></p>
        </div>

        <div id="adminSettingsCard" class="card" style="display: none; background: #f8fafc; border: 1px solid #cbd5e1;">
            <h2>⚙️ システム設定変更（管理者専用）</h2>
            <div class="settings-form-grid">
                <div class="form-group" style="margin-bottom:0;"><label>提出期限</label><input type="text" id="inputDeadline"></div>
                <div class="form-group" style="margin-bottom:0;"><label>締め日</label><input type="text" id="inputClosing"></div>
                <div class="form-group" style="margin-bottom:0;"><label>支給日</label><input type="text" id="inputPayment"></div>
                <button onclick="saveSystemSettings()" class="btn-success" style="width: auto; padding: 11px 24px;">設定を保存する</button>
            </div>
        </div>

        <div id="payslipCard" class="card" style="display: none; border: 2px solid var(--success); background: #f0fdf4;">
            <h2 style="color: #065f46;">📄 <span id="payslipTitleMonth">先月</span>分の確定勤怠・給与明細</h2>
            <p style="font-size: 0.85rem; color: #374151; margin-bottom: 15px;">※先月確定した労働実績および明細書を表示しています。</p>
            <div style="display: flex; gap: 30px; font-weight: bold; margin-bottom: 15px; font-size: 1.1rem; color: #111827;">
                <div>実質労働時間: <span id="payslipHours" style="color: var(--primary);">0</span> 時間</div>
                <div>差引支給額: <span id="payslipTotalPay" style="color: var(--success);">¥0</span></div>
            </div>
            <table class="payslip-table">
                <thead><tr><th>勤務日</th><th>勤務時間</th><th>休憩</th><th>実働</th><th>概算給与</th></tr></thead>
                <tbody id="payslipTableBody"></tbody>
            </table>
        </div>

        <div id="salarySummaryCard" class="summary-wrapper" style="display: none;">
            <div class="summary-card time-card">
                <div class="summary-title"><span class="current-month-label">今</span>月の総労働時間</div>
                <div class="summary-amount" id="totalMonthlyHours">0 時間</div>
            </div>
            <div class="summary-card">
                <div class="summary-title"><span class="current-month-label">今</span>月の概算給与合計</div>
                <div class="summary-amount" id="totalMonthlySalary">¥0</div>
            </div>
        </div>

        <div id="adminSummaryCard" class="card" style="display: none; background: #faf5ff; border: 1px solid #d8b4fe;">
            <h2>📊 全スタッフの<span class="current-month-label">今</span>月合計</h2>
            <div style="display: flex; gap: 30px; font-weight: bold; font-size: 1.2rem;">
                <div>総配置時間: <span id="adminTotalHours" style="color: #8b5cf6;">0</span> 時間</div>
                <div>総概算人件費: <span id="adminTotalPay" style="color: #a855f7;">¥0</span></div>
            </div>
        </div>

        <div class="flex-box">
            <div id="calendarZone" class="card">
                <h2 id="calendarTitle">📅 シフトカレンダー</h2>
                
                <div class="calendar-header">
                    <button class="calendar-nav-btn" onclick="changeMonth(-1)">◀ 前の月</button>
                    <div class="current-month-display" id="currentMonthDisplay">2026年07月</div>
                    <button class="calendar-nav-btn" onclick="changeMonth(1)">次の月 ▶</button>
                </div>

                <p id="selectedDateText" style="font-weight: bold; color: var(--primary); margin-bottom: 10px;">📅 日付を選択してください</p>
                <div class="calendar-grid" id="calendarGrid"></div>

                <div id="shiftFormFields" style="margin-top:15px;">
                    <div style="border-bottom: 1px dashed #e2e8f0; padding-bottom: 15px; margin-bottom: 15px;">
                        <div class="form-group"><label>開始時間</label><input type="time" id="startTime" value="09:00"></div>
                        <div class="form-group"><label>終了時間</label><input type="time" id="endTime" value="18:00"></div>
                        <!-- ★ No.10対応: 54分などの端数を任意のキー入力可能にするため step="15" を削除 -->
                        <div class="form-group"><label>休憩時間 (分)</label><input type="number" id="breakTime" value="0" min="0"></div>
                        <div class="form-group" id="adminStaffSelectGroup" style="display: none;">
                            <label>対象スタッフID</label><input type="text" id="targetStaffId" placeholder="例: staff01">
                        </div>
                        <button id="submitBtn" onclick="submitShift()" disabled>この日付でシフトを登録・申請する</button>
                    </div>

                    <div class="form-group" id="memoFormGroup" style="background: #fdf2f8; padding: 12px; border-radius: 8px; border: 1px solid #fbcfe8;">
                        <label style="color: #9d174d;">📝 この日のメモ・祝日設定（画面共通）</label>
                        <div style="display:flex; gap: 8px;">
                            <input type="text" id="dayMemoInput" placeholder="例: 海の日、店舗イベント など">
                            <button onclick="saveDayMemo()" id="saveMemoBtn" class="btn-success" style="width:auto; padding: 0 15px; font-size:0.9rem;" disabled>保存</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 id="listTitle">📋 シフト一覧</h2>
                <div id="shiftList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://127.0.0.1:5001/api';
    let currentLoggedInUser = ''; let currentLoggedInName = ''; let userRole = ''; let selectedDate = ''; let allShifts = [];
    let systemDeadline = ''; 
    
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();

    const mainContainer = document.getElementById('mainContainer');
    const loginCard = document.getElementById('loginCard');
    const dashboard = document.getElementById('dashboard');
    const welcomeText = document.getElementById('welcomeText');
    const systemSettingsText = document.getElementById('systemSettingsText');
    const alertBanner = document.getElementById('alertBanner');
    const calendarGrid = document.getElementById('calendarGrid');
    const selectedDateText = document.getElementById('selectedDateText');
    const submitBtn = document.getElementById('submitBtn');
    const shiftList = document.getElementById('shiftList');
    const calendarTitle = document.getElementById('calendarTitle');
    const listTitle = document.getElementById('listTitle');
    const salarySummaryCard = document.getElementById('salarySummaryCard');
    const totalMonthlyHours = document.getElementById('totalMonthlyHours');
    const totalMonthlySalary = document.getElementById('totalMonthlySalary');
    const adminSummaryCard = document.getElementById('adminSummaryCard');
    const adminTotalHours = document.getElementById('adminTotalHours');
    const adminTotalPay = document.getElementById('adminTotalPay');
    const adminStaffSelectGroup = document.getElementById('adminStaffSelectGroup');
    const adminSettingsCard = document.getElementById('adminSettingsCard');
    const payslipCard = document.getElementById('payslipCard');
    const currentMonthDisplay = document.getElementById('currentMonthDisplay');
    const dayMemoInput = document.getElementById('dayMemoInput');
    const saveMemoBtn = document.getElementById('saveMemoBtn');

    function isWithinOneWeekOrPast(dateString) {
        if (userRole === 'manager') return false; 

        const targetDate = new Date(dateString + 'T00:00:00');
        const today = new Date();
        today.setHours(0,0,0,0);

        const oneWeekLater = new Date(today);
        oneWeekLater.setDate(today.getDate() + 7);

        return targetDate < oneWeekLater;
    }

    async function handleLogin() {
        const userId = document.getElementById('userId').value.trim();
        const password = document.getElementById('password').value;
        if (!userId || !password) { alert('⚠️ ユーザーIDとパスワードを入力してください。'); return; }

        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, password })
            });
            const data = await res.json();
            if (data.status === 'success') {
                currentLoggedInUser = userId; currentLoggedInName = data.user.name; userRole = data.user.role;
                welcomeText.innerText = `👋 ようこそ、${currentLoggedInName} さん (${userRole === 'manager' ? '管理者' : 'スタッフ'})`;
                loginCard.style.display = 'none'; dashboard.style.display = 'block';
                mainContainer.className = 'container'; document.body.style.alignItems = 'flex-start';

                if (userRole === 'manager') {
                    calendarTitle.innerText = '⚙️ シフト代理登録・カレンダー確認';
                    listTitle.innerText = '⚙️ 全スタッフのシフト管理（承認・編集）';
                    adminStaffSelectGroup.style.display = 'block'; 
                    salarySummaryCard.style.display = 'none';
                    adminSummaryCard.style.display = 'block';
                    adminSettingsCard.style.display = 'block'; 
                    payslipCard.style.display = 'none';
                } else {
                    calendarTitle.innerText = '📅 希望シフトの申請';
                    listTitle.innerText = '📋 自分の申請済みシフト一覧';
                    adminStaffSelectGroup.style.display = 'none'; 
                    salarySummaryCard.style.display = 'grid';
                    adminSummaryCard.style.display = 'none';
                    adminSettingsCard.style.display = 'none';
                    await checkAndRenderPayslip();
                }
                await loadSystemSettings(); await fetchShifts(); await checkNotifications();
            } else { alert('⚠️ ' + data.message); }
        } catch (err) { alert('⚠️ ログイン通信に失敗しました。'); }
    }

    async function checkAndRenderPayslip() {
        try {
            const res = await fetch(`${API_URL}/payslip`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: currentLoggedInUser })
            });
            const data = await res.json();
            if (data.status === 'success' && data.details.length > 0) {
                document.getElementById('payslipTitleMonth').innerText = data.targetMonth;
                document.getElementById('payslipHours').innerText = data.totalHours;
                document.getElementById('payslipTotalPay').innerText = `¥${data.totalPay.toLocaleString()}`;
                const tbody = document.getElementById('payslipTableBody');
                tbody.innerHTML = '';
                data.details.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `<td>${item.date}</td><td>${item.time}</td><td>${item.breakTime}分</td><td>${item.hours}h</td><td>¥${item.pay.toLocaleString()}</td>`;
                    tbody.appendChild(row);
                });
                payslipCard.style.display = 'block';
            } else { payslipCard.style.display = 'none'; }
        } catch (e) { console.error("明細の取得に失敗しました", e); }
    }

    async function loadSystemSettings() {
        const res = await fetch(`${API_URL}/settings`); const data = await res.json();
        if (data.status === 'success') {
            systemDeadline = data.settings.deadlineDate || '';
            systemSettingsText.innerText = `📢 【現在の設定】提出期限: ${systemDeadline} | 締め日: ${data.settings.closingDate} | 支給日: ${data.settings.paymentDate}`;
            if (userRole === 'manager') {
                document.getElementById('inputDeadline').value = systemDeadline;
                document.getElementById('inputClosing').value = data.settings.closingDate;
                document.getElementById('inputPayment').value = data.settings.paymentDate;
            }
        }
    }

    async function saveSystemSettings() {
        const newDeadline = document.getElementById('inputDeadline').value;
        const res = await fetch(`${API_URL}/admin/settings-update`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                deadlineDate: newDeadline,
                closingDate: document.getElementById('inputClosing').value,
                paymentDate: document.getElementById('inputPayment').value
            })
        });
        if (res.ok) { 
            alert('✅ システム設定を保存しました。'); 
            systemDeadline = newDeadline;
            await loadSystemSettings(); 
            await checkNotifications();
        }
    }

    async function checkNotifications() {
        if (userRole === 'manager') {
            alertBanner.style.display = 'none';
            return;
        }
        
        try {
            const res = await fetch(`${API_URL}/notifications`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ username: currentLoggedInUser }) 
            });
            const data = await res.json();
            
            if (data.status === 'success' && data.alerts.length > 0) {
                if (!systemDeadline) {
                    alertBanner.style.display = 'none';
                    return;
                }
                
                const today = new Date();
                const currentYear = today.getFullYear();
                const currentMonth = today.getMonth();
                
                const deadlineDayNum = parseInt(systemDeadline.replace(/[^0-9]/g, ''), 10);
                
                if (isNaN(deadlineDayNum)) {
                    alertBanner.style.display = 'none';
                    return;
                }

                const deadlineDate = new Date(currentYear, currentMonth, deadlineDayNum);
                
                today.setHours(0, 0, 0, 0);
                deadlineDate.setHours(0, 0, 0, 0);

                const diffTime = deadlineDate - today;
                const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays >= 0 && diffDays <= 3) {
                    alertBanner.innerText = data.alerts[0].message; 
                    alertBanner.style.display = 'block'; 
                } else {
                    alertBanner.style.display = 'none'; 
                }
            }
        } catch (err) {
            console.error("通知の取得に失敗しました", err);
        }
    }

    function changeMonth(offset) {
        currentMonth += offset;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        
        generateCalendar();
        calculateMonthlySummary();
        renderShiftList();
    }

    function generateCalendar() {
        currentMonthDisplay.innerText = `${currentYear}年${String(currentMonth + 1).padStart(2, '0')}月`;
        document.querySelectorAll('.current-month-label').forEach(el => el.innerText = `${currentMonth + 1}`);

        calendarGrid.innerHTML = '<div class="day-name">日</div><div class="day-name">月</div><div class="day-name">火</div><div class="day-name">水</div><div class="day-name">木</div><div class="day-name">金</div><div class="day-name">土</div>';
        const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay(); const lastDay = new Date(currentYear, currentMonth + 1, 0).getDate();

        for (let i = 0; i < firstDayIndex; i++) calendarGrid.appendChild(document.createElement('div'));

        const savedMemos = JSON.parse(localStorage.getItem('shift_system_memos') || '{}');
        
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

        for (let day = 1; day <= lastDay; day++) {
            const dayDiv = document.createElement('div'); dayDiv.className = 'calendar-day'; dayDiv.innerText = day;
            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            dayDiv.dataset.date = dateStr;

            if (dateStr === todayStr) {
                dayDiv.classList.add('today');
                const tBadge = document.createElement('span');
                tBadge.className = 'today-badge';
                tBadge.innerText = '🔴今日';
                dayDiv.appendChild(tBadge);
            }

            if (savedMemos[dateStr]) {
                const memoDiv = document.createElement('div');
                memoDiv.className = 'day-memo';
                memoDiv.innerText = savedMemos[dateStr];
                dayDiv.appendChild(memoDiv);
            }

            const dayShifts = allShifts.filter(s => userRole === 'manager' ? s.date === dateStr : (s.date === dateStr && s.username === currentLoggedInUser));
            
            if (dayShifts.length > 0) {
                const confirmed = dayShifts.find(s => s.status === 'confirmed');
                if (confirmed) {
                    dayDiv.classList.add('has-confirmed');
                    dayDiv.innerHTML += `
                        <div style="font-size: 0.7rem; color: #047857; font-weight: bold; margin-top: 4px; background: #d1fae5; padding: 2px; border-radius: 4px; text-align: center;">
                            🕒 ${confirmed.startTime}～${confirmed.endTime}
                        </div>
                        <span class="status-dot" style="color:#057a55; margin-top: 2px;">✅ 確定</span>
                    `;
                } else {
                    const applied = dayShifts[0];
                    dayDiv.classList.add('has-applied');
                    dayDiv.innerHTML += `
                        <div style="font-size: 0.7rem; color: #b45309; font-weight: bold; margin-top: 4px; background: #fef3c7; padding: 2px; border-radius: 4px; text-align: center; opacity: 0.9;">
                            ⏳ ${applied.startTime}～${applied.endTime}
                        </div>
                        <span class="status-dot" style="margin-top: 2px;">⏳ 申請中</span>
                    `;
                }
            }

            dayDiv.addEventListener('click', function() {
                document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
                this.classList.add('selected'); selectedDate = this.dataset.date;
                
                if (isWithinOneWeekOrPast(selectedDate)) {
                    selectedDateText.innerHTML = `📅 選択中: ${currentMonth + 1}月${day}日 <span style="color:var(--danger); font-size:0.85rem; block; margin-top:2px;">⚠️ 1週間以内の変更は外部で連絡してください</span>`;
                    submitBtn.disabled = true; 
                } else {
                    selectedDateText.innerText = `📅 選択中: ${currentMonth + 1}月${day}日`;
                    submitBtn.disabled = false;
                }
                
                if (userRole === 'manager') {
                    submitBtn.disabled = false;
                }

                saveMemoBtn.disabled = false;
                dayMemoInput.value = savedMemos[selectedDate] || '';
            });
            calendarGrid.appendChild(dayDiv);
        }
    }

    function saveDayMemo() {
        if (!selectedDate) return;
        const savedMemos = JSON.parse(localStorage.getItem('shift_system_memos') || '{}');
        const text = dayMemoInput.value.trim();
        if (text) { savedMemos[selectedDate] = text; } else { delete savedMemos[selectedDate]; }
        localStorage.setItem('shift_system_memos', JSON.stringify(savedMemos));
        generateCalendar();
    }

    async function fetchShifts() {
        const res = await fetch(`${API_URL}/shifts`); const data = await res.json();
        if (data.status === 'success') { 
            allShifts = data.shifts; 
            generateCalendar(); 
            calculateMonthlySummary();
            renderShiftList(); 
        }
    }

    function calculateMonthlySummary() {
        const targetMonthPrefix = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
        if (userRole === 'manager') {
            const monthlyShifts = allShifts.filter(s => s.date.startsWith(targetMonthPrefix));
            const totalHours = monthlyShifts.reduce((sum, s) => sum + s.calculation.totalHours, 0);
            const totalPay = monthlyShifts.reduce((sum, s) => sum + s.calculation.totalPay, 0);
            adminTotalHours.innerText = totalHours.toFixed(1);
            adminTotalPay.innerText = `¥${totalPay.toLocaleString()}`;
        } else {
            const myMonthlyShifts = allShifts.filter(s => s.username === currentLoggedInUser && s.date.startsWith(targetMonthPrefix));
            const totalHours = myMonthlyShifts.reduce((sum, s) => sum + s.calculation.totalHours, 0);
            const totalPay = myMonthlyShifts.reduce((sum, s) => sum + s.calculation.totalPay, 0);
            totalMonthlyHours.innerText = `${totalHours.toFixed(1)} 時間`;
            totalMonthlySalary.innerText = `¥${totalPay.toLocaleString()}`;
        }
    }

    function renderShiftList() {
        shiftList.innerHTML = '';
        const targetMonthPrefix = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
        let filtered = userRole === 'manager' ? allShifts : allShifts.filter(s => s.username === currentLoggedInUser);
        filtered = filtered.filter(s => s.date.startsWith(targetMonthPrefix));

        if (filtered.length === 0) { shiftList.innerHTML = `<p style="color:#6b7280;">${currentMonth + 1}月のシフトはまだありません。</p>`; return; }

        filtered.forEach(shift => {
            const item = document.createElement('div'); item.className = 'shift-item';
            const calc = shift.calculation;
            const statusBadge = shift.status === 'confirmed' ? '<span class="badge badge-confirmed">確定</span>' : '<span class="badge badge-applied">承認待ち</span>';
            
            const isLocked = isWithinOneWeekOrPast(shift.date);

            let htmlStr = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong>📅 ${shift.date} (${shift.startTime} ～ ${shift.endTime})</strong> ${statusBadge}
                </div>
                <div style="font-size:0.85rem; color:#6b7280; margin-top:4px;">
                    スタッフ: ${shift.name} | 休憩: ${shift.breakTime}分 | 実働: ${calc.totalHours}h
                </div>
                <div class="salary-breakdown">💰 <strong>概算給与: ¥${calc.totalPay.toLocaleString()}</strong></div>
            `;

            if (userRole === 'manager') {
                htmlStr += `<div class="admin-actions">`;
                if (shift.status === 'applied') htmlStr += `<button class="btn-sm btn-success" onclick="confirmShiftWithBreak(${shift.id})">👍 確定する</button>`;
                htmlStr += `
                    <button class="btn-sm" style="background:#6b7280;" onclick="openEditPrompt(${shift.id}, '${shift.startTime}', '${shift.endTime}', ${shift.breakTime})">✏️ 編集</button>
                    <button class="btn-sm btn-danger" onclick="updateShift(${shift.id}, 'delete')">🗑️ 削除</button>
                </div>`;
            } else {
                htmlStr += `<div class="admin-actions">
                    <button class="btn-sm btn-danger" onclick="cancelShiftByStaff(${shift.id})" ${isLocked ? 'disabled title="1週間以内のため変更不可"' : ''}>
                        ${isLocked ? '🔒 変更不可' : '❌ キャンセル'}
                    </button>
                </div>`;
            }
            item.innerHTML = htmlStr; shiftList.appendChild(item);
        });
    }

    async function confirmShiftWithBreak(shiftId) {
        const breakTime = document.getElementById('breakTime').value;
        const res = await fetch(`${API_URL}/admin/shift-update`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ shiftId, action: 'confirm', breakTime })
        });
        if (!res.ok) { const d = await res.json(); alert(d.message); return; }
        await fetchShifts();
    }

    async function submitShift() {
        const startTime = document.getElementById('startTime').value;
        const endTime = document.getElementById('endTime').value;
        const breakTime = document.getElementById('breakTime').value;
        let username = currentLoggedInUser;
        
        if (userRole === 'manager') {
            username = document.getElementById('targetStaffId').value.trim();
            if (!username) { alert('⚠️ 対象スタッフIDを入力してください。'); return; }
        } else {
            if (isWithinOneWeekOrPast(selectedDate)) { alert('⚠️ 1週間以内のシフト変更・申請はシステムからは行えません。'); return; }
        }

        const res = await fetch(`${API_URL}/shift-submit`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, date: selectedDate, startTime, endTime, breakTime })
        });
        if (!res.ok) { const d = await res.json(); alert(d.message); return; }
        alert('✅ シフトを登録・申請しました。'); await fetchShifts();
    }

    async function updateShift(shiftId, action) {
        const res = await fetch(`${API_URL}/admin/shift-update`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ shiftId, action }) });
        if (res.ok) await fetchShifts();
    }

    async function openEditPrompt(shiftId, currentStart, currentEnd, currentBreak) {
        const newStart = prompt("新しい開始時間 (HH:MM)", currentStart); if (!newStart) return;
        const newEnd = prompt("新しい終了時間 (HH:MM)", currentEnd); if (!newEnd) return;
        const newBreak = prompt("新しい休憩時間 (分)", currentBreak); if (newBreak === null) return;

        const res = await fetch(`${API_URL}/admin/shift-update`, { 
            method: 'POST', headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ shiftId, action: 'edit', startTime: newStart, endTime: newEnd, breakTime: newBreak }) 
        });
        if (!res.ok) { const d = await res.json(); alert(d.message); return; }
        await fetchShifts();
    }

    // ★ No.17対応: エラー発生時（確定済みシフト削除制限など）にサーバーが返したエラー文言を画面上へダイアログ表示できるよう修正
    async function cancelShiftByStaff(shiftId) {
        try {
            const res = await fetch(`${API_URL}/shift-cancel`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ shiftId }) 
            });
            const d = await res.json();
            if (res.ok) { 
                alert('✅ キャンセルしました。'); 
                await fetchShifts(); 
            } else { 
                alert('⚠️ ' + (d.message || 'キャンセルに失敗しました。')); 
            }
        } catch (err) {
            alert('⚠️ 通信エラーが発生しました。');
        }
    }

    function handleLogout() {
        currentLoggedInUser = ''; currentLoggedInName = ''; userRole = ''; systemDeadline = '';
        dashboard.style.display = 'none'; loginCard.style.display = 'block';
        alertBanner.style.display = 'none';
        mainContainer.className = 'login-container'; document.body.style.alignItems = 'center';
    }
</script>
</body>
</html>
